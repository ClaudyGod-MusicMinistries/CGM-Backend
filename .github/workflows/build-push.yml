name: Build & Push API → GHCR

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/claudygod-musicministries/cgm-api

jobs:
  # ─── Test ─────────────────────────────────────────────────────────────────────
  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore ClaudyGod.sln

      - name: Build (no-restore)
        run: dotnet build ClaudyGod.sln --no-restore -c Release

      - name: Test
        run: dotnet test ClaudyGod.sln --no-build -c Release --logger "console;verbosity=normal" --results-directory TestResults

  # ─── Build + Push ────────────────────────────────────────────────────────────
  build:
    name: Build & push image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      short-sha: ${{ steps.sha.outputs.short }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        run: |
          docker buildx create --use --name cgm-builder --driver docker-container
          docker buildx inspect --bootstrap

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push
        run: |
          SHORT_SHA="${{ steps.sha.outputs.short }}"
          IS_MAIN="${{ github.ref == 'refs/heads/main' }}"
          IS_PR="${{ github.event_name == 'pull_request' }}"
          PR_NUM="${{ github.event.number }}"

          # Build tag list
          TAGS="--tag ${{ env.IMAGE_NAME }}:sha-${SHORT_SHA}"
          if [ "$IS_MAIN" = "true" ]; then
            TAGS="$TAGS --tag ${{ env.IMAGE_NAME }}:latest"
          fi
          if [ "$IS_PR" = "true" ]; then
            TAGS="$TAGS --tag ${{ env.IMAGE_NAME }}:pr-${PR_NUM}"
          fi

          # Only push on non-PR builds
          PUSH_FLAG="--push"
          if [ "$IS_PR" = "true" ]; then
            PUSH_FLAG="--load"
          fi

          docker buildx build \
            --platform linux/amd64 \
            --file Dockerfile \
            --cache-from type=gha \
            --cache-to   type=gha,mode=max \
            --label "org.opencontainers.image.title=ClaudyGod API" \
            --label "org.opencontainers.image.description=ClaudyGod Music Ministry – .NET 8 REST API" \
            --label "org.opencontainers.image.vendor=ClaudyGod-MusicMinistries" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            $TAGS $PUSH_FLAG \
            .

      # ── Run migrations from the CI runner (has direct internet to Supabase) ──
      # The VPS Docker daemon has DNS issues that cause VPS-side migrations to
      # time out. Running here on the ubuntu-latest runner guarantees connectivity.
      - name: Run database migrations
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          # Bind the secret to a step-level env var so the shell handles it as
          # a variable (not inline text), which is safe for values with semicolons.
          MIGRATE_CONN: ${{ secrets.MIGRATE_CONNECTION_STRING }}
        run: |
          if [ -z "$MIGRATE_CONN" ]; then
            echo "❌ MIGRATE_CONNECTION_STRING secret is not set."
            echo ""
            echo "Add it in GitHub → CGM-Backend → Settings → Secrets and variables → Actions → New repository secret"
            echo ""
            echo "  Name:  MIGRATE_CONNECTION_STRING"
            echo "  Value: Host=aws-1-eu-central-1.pooler.supabase.com;Port=5432;Database=postgres;Username=postgres.ktzhbaqumdvypegnsgok;Password=ClaudyGod@2026;Ssl Mode=Require;Trust Server Certificate=true;Pooling=false;Timeout=60;Application Name=cgm_migrate"
            echo ""
            echo "Then re-run this workflow."
            exit 1
          fi

          echo "→ Pulling image for migration run..."
          docker pull ${{ env.IMAGE_NAME }}:sha-${{ steps.sha.outputs.short }}

          echo "→ Applying EF Core migrations against Supabase..."
          docker run --rm \
            -e ASPNETCORE_ENVIRONMENT=Production \
            -e "ConnectionStrings__DefaultConnection=${MIGRATE_CONN}" \
            ${{ env.IMAGE_NAME }}:sha-${{ steps.sha.outputs.short }} \
            --migrate

          echo "✓ Migrations applied"

      - name: Summary
        if: github.event_name != 'pull_request'
        run: |
          echo "### ✅ API image pushed to GHCR" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tags | \`latest\`, \`sha-${{ steps.sha.outputs.short }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Migrations | ✅ Applied from CI runner |" >> $GITHUB_STEP_SUMMARY

  # ─── SSH deploy to production server ─────────────────────────────────────────
  deploy:
    name: Deploy API to production
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          timeout: 180s
          script: |
            set -e
            export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$PATH"
            DEPLOY_PATH="$(echo '${{ secrets.VPS_DEPLOY_PATH }}' | tr -d '[:space:]')"
            cd "$DEPLOY_PATH"

            # Pull latest infra scripts (force local to match remote)
            git fetch origin main && git reset --hard origin/main || true

            # Authenticate to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Migrations already ran in CI — just pull and restart the API
            export TAG="sha-${{ needs.build.outputs.short-sha }}"
            COMPOSE="docker compose --env-file $DEPLOY_PATH/.env --project-directory $DEPLOY_PATH -f $DEPLOY_PATH/docker/docker-compose.yml"

            echo "→ Pulling API image (tag: $TAG)..."
            $COMPOSE pull api

            echo "→ Restarting API..."
            $COMPOSE up -d --no-deps --remove-orphans api

            docker image prune -f --filter "until=24h" >/dev/null
            echo "✓ API deploy complete — $(date -u +%Y-%m-%dT%H:%M:%SZ)"
