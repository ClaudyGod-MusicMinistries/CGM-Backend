name: claudygod

# ─────────────────────────────────────────────────────────────────────────────
# All secrets are consumed from .env (never committed).
# Run: cp .env.example .env && fill in values before first deploy.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Traefik reverse proxy ───────────────────────────────────────────────────
  traefik:
    image: traefik:v3.3
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/traefik.yml:ro
      - ./traefik/dynamic.yml:/dynamic.yml:ro
      - traefik_acme:/acme.json
    networks:
      - traefik-public
    labels:
      - "traefik.enable=false"
    environment:
      - ACME_EMAIL=${ACME_EMAIL}

  # ── PostgreSQL database ─────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-claudygod}
      POSTGRES_USER: ${POSTGRES_USER:-cgm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cgm} -d ${POSTGRES_DB:-claudygod}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis cache ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── EF Core migration runner (exits after running) ──────────────────────────
  migrate:
    image: claudygod-api:${TAG:-latest}
    build:
      context: ..
      dockerfile: Dockerfile
    restart: on-failure:3
    command: ["dotnet", "ClaudyGod.API.dll", "--migrate"]
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: >-
        Host=db;Port=5432;Database=${POSTGRES_DB:-claudygod};
        Username=${POSTGRES_USER:-cgm};Password=${POSTGRES_PASSWORD};
        Ssl Mode=Prefer;Trust Server Certificate=true
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  # ── .NET API ────────────────────────────────────────────────────────────────
  api:
    image: claudygod-api:${TAG:-latest}
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080

      # Database
      ConnectionStrings__DefaultConnection: >-
        Host=db;Port=5432;Database=${POSTGRES_DB:-claudygod};
        Username=${POSTGRES_USER:-cgm};Password=${POSTGRES_PASSWORD};
        Ssl Mode=Prefer;Trust Server Certificate=true

      # Redis (with password)
      Redis__ConnectionString: redis:default:${REDIS_PASSWORD}@redis:6379
      Redis__InstanceName: "claudygod:"

      # JWT
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ClaudyGod.API
      Jwt__Audience: ClaudyGod.Client
      Jwt__AccessTokenExpiryMinutes: "15"
      Jwt__RefreshTokenExpiryDays: "14"

      # Email
      Email__SmtpHost: ${EMAIL_SMTP_HOST:-smtp.gmail.com}
      Email__SmtpPort: ${EMAIL_SMTP_PORT:-587}
      Email__SmtpUsername: ${EMAIL_SMTP_USERNAME}
      Email__SmtpPassword: ${EMAIL_SMTP_PASSWORD}
      Email__SenderEmail: ${EMAIL_SMTP_USERNAME}
      Email__SenderName: "ClaudyGod Ministry"
      Email__AdminEmail: ${EMAIL_ADMIN}
      Email__EnableSsl: "true"

      # File storage
      FileStorage__LocalBasePath: /app/uploads
      FileStorage__BaseUrl: /uploads
      FileStorage__MaxFileSizeMb: "50"

      # Encryption (AES-256)
      Encryption__Key: ${ENCRYPTION_KEY}

      # CORS — must include the frontend domain
      Cors__Origins__0: https://${DOMAIN}
      Cors__Origins__1: https://www.${DOMAIN}

      # Rate limits
      RateLimit__PermitLimit: "100"
      RateLimit__WindowSeconds: "60"

      # Anthropic (Claude AI)
      Anthropic__ApiKey: ${ANTHROPIC_API_KEY}
      Anthropic__Model: "claude-sonnet-4-6"

    volumes:
      - api_uploads:/app/uploads
      - api_logs:/app/logs
    networks:
      - traefik-public
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cgm-api.rule=Host(`${API_DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.cgm-api.entrypoints=websecure"
      - "traefik.http.routers.cgm-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.cgm-api.tls.options=modern@file"
      - "traefik.http.services.cgm-api.loadbalancer.server.port=8080"
      - "traefik.http.routers.cgm-api.middlewares=secureHeaders@file,compression@file,globalRateLimit@file"
      # Health-check route (no rate limit)
      - "traefik.http.routers.cgm-healthz.rule=Host(`${API_DOMAIN}`) && Path(`/healthz`)"
      - "traefik.http.routers.cgm-healthz.entrypoints=websecure"
      - "traefik.http.routers.cgm-healthz.tls.certresolver=letsencrypt"
      - "traefik.http.services.cgm-healthz.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  # ── Next.js frontend ────────────────────────────────────────────────────────
  web:
    image: claudygod-web:${TAG:-latest}
    build:
      context: ../../ClaudyGodWebApp          # path to Next.js repo root
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY: ${NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY}
        NEXT_PUBLIC_SITE_URL: https://${DOMAIN}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_BASE_URL: http://api:8080
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY}
      NEXT_PUBLIC_SITE_URL: https://${DOMAIN}
    networks:
      - traefik-public
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cgm-web.rule=Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)"
      - "traefik.http.routers.cgm-web.entrypoints=websecure"
      - "traefik.http.routers.cgm-web.tls.certresolver=letsencrypt"
      - "traefik.http.routers.cgm-web.tls.options=modern@file"
      - "traefik.http.services.cgm-web.loadbalancer.server.port=3000"
      - "traefik.http.routers.cgm-web.middlewares=secureHeaders@file,compression@file,wwwRedirect@file"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  traefik_acme:
  db_data:
  redis_data:
  api_uploads:
  api_logs:

networks:
  traefik-public:
    external: true       # pre-create: docker network create traefik-public
  internal:
    driver: bridge
    internal: true       # no outbound internet from internal services
